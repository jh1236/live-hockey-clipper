services:
  hockey-clipper-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_ADDRESS: "http://localhost:5003"
    image: hockey-clipper-frontend
    container_name: hockey-clipper-frontend-container
    ports:
      - "8081:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped
  hockey-clipper-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - db:/database
      - cache:/cache
      - videos:/video
    image: hockey-clipper-backend
    container_name: hockey-clipper-backend-container
    command: 'python -m flask --app app run --debug --host 0.0.0.0 -p 5000'
    environment:
      ADDRESS: "http://localhost:5003"
      GUNICORN_CMD_ARGS: "--capture-output"
    ports:
      - "5003:5000"
    restart: unless-stopped

volumes:
  db:
  cache:
  videos: